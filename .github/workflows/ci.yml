name: VendingOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar la versión de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependencias del proyecto
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest httpx cryptography

    - name: Ejecutar pruebas automáticas con Pytest
      env:
        DB_PASSWORD: "mock_password_para_pruebas"
        DB_PORT: "3306"               
        DB_HOST: "localhost"
        DB_USER: "canela"
        DB_NAME: "vending_db"
        API_SECRET: "mock_secret_para_pruebas"
        ACCESS_TOKEN_EXPIRE_MINUTES: "30"
        DATABASE_URL: "sqlite:///:memory:"
      run: |
        pytest
