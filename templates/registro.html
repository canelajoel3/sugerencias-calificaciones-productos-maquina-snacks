<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-ico" href="/static/img_ico/snack.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <div class="inline-flex p-3 bg-blue-500/10 text-blue-400 rounded-xl mb-3">
                <i class="fa-solid fa-user-plus text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide">Crear Cuenta</h1>
            <p class="text-slate-400 text-sm mt-1">Registrar un nuevo administrador para el sistema</p>
        </div>

        <div id="alert-container" class="hidden mb-4 p-4 rounded-xl text-sm border"></div>

        <form id="registro-form" class="space-y-5">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Nombre</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                            <i class="fa-solid fa-user text-xs"></i>
                        </span>
                        <input type="text" id="nombre" required
                            class="w-full pl-9 pr-3 py-2.5 bg-slate-950 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-colors text-sm"
                            placeholder="Juan">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Apellido</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                            <i class="fa-solid fa-user text-xs"></i>
                        </span>
                        <input type="text" id="apellido" required
                            class="w-full pl-9 pr-3 py-2.5 bg-slate-950 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-colors text-sm"
                            placeholder="Pérez">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Nombre de la Empresa</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-building text-xs"></i>
                    </span>
                    <input type="text" id="nombre_empresa" required
                        class="w-full pl-9 pr-3 py-2.5 bg-slate-950 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-colors text-sm"
                        placeholder="Nombre de tu empresa">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Correo Electrónico</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors"
                        placeholder="admin@ejemplo.com">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Contraseña</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" required minlength="6"
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full py-3 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-medium rounded-xl transition-colors shadow-lg shadow-blue-600/20 flex items-center justify-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                Registrar Administrador
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="/login" class="text-sm text-slate-400 hover:text-blue-400 transition-colors">
                <i class="fa-solid fa-arrow-left mr-1"></i> Volver al Login
            </a>
        </div>
    </div>

    <script>
        document.getElementById('registro-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const alertContainer = document.getElementById('alert-container');

            const nombre = document.getElementById('nombre').value.trim();
            const apellido = document.getElementById('apellido').value.trim();
            const email = document.getElementById('email').value.trim();
            const contrasena = document.getElementById('password').value.trim();
            const nombre_empresa = document.getElementById('nombre_empresa').value.trim();

            alertContainer.classList.add('hidden');

            try {
                const response = await fetch('/auth/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nombre,
                        apellido,
                        email,
                        contrasena,
                        nombre_empresa
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alertContainer.className = "mb-4 p-4 rounded-xl text-sm border bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
                    alertContainer.innerHTML = `✔ Registro exitoso`;
                    alertContainer.classList.remove('hidden');
                    document.getElementById('registro-form').reset();
                } else {
                    // 🔥 SOLUCIÓN AQUÍ
                    let mensajeError = 'Error al procesar el registro';

                    if (Array.isArray(data.detail)) {
                        mensajeError = data.detail.map(err => err.msg).join(', ');
                    } else if (typeof data.detail === 'string') {
                        mensajeError = data.detail;
                    }

                    throw new Error(mensajeError);
                }

            } catch (error) {
                alertContainer.className = "mb-4 p-4 rounded-xl text-sm border bg-rose-500/10 text-rose-400 border-rose-500/20";
                alertContainer.innerHTML = `❌ ${error.message}`;
                alertContainer.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
